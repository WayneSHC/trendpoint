name: TrendPoint - 測試套件 (CI)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - name: 檢出專案程式碼
        uses: actions/checkout@v4

      - name: 設定 Python ${{ matrix.python-version }} 環境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行 pytest
        run: pytest -q

      # 憲法原則 IV：Numba 為選配加速，降級後結果必須一致。
      # 以無 Numba 環境重跑核心測試，驗證自動回退機制。
      - name: 驗證無 Numba 環境之降級回退
        run: |
          pip uninstall -y numba
          pytest -q tests/test_ladder_system.py tests/test_lookahead_bias.py tests/test_acceptance_parity.py
