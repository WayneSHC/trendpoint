name: Range Navigator - 定時訊號監控通知

on:
  schedule:
    # 每 30 分鐘執行一次以涵蓋 24 小時的實時訊號監控
    - cron: '*/30 * * * *'
  workflow_dispatch: # 支援手動觸發執行

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出專案程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 還原 SQLite 資料庫快取
        uses: actions/cache@v3
        with:
          path: range_navigator.db
          key: range-navigator-db-${{ github.run_id }}
          restore-keys: |
            range-navigator-db-

      - name: 執行實時訊號檢測與推播
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor_signals.py --once
