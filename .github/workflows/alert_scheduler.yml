name: TrendPoint - 定時訊號監控通知

on:
  schedule:
    # 台股交易時段（週一至五 09:00-13:30 台北 = 01:00-05:30 UTC）每 30 分鐘一次；
    # 收盤與週末不執行，避免無意義的 Actions 配額消耗
    - cron: '*/30 1-5 * * 1-5'
  workflow_dispatch: # 支援手動觸發執行

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出專案程式碼
        uses: actions/checkout@v5

      - name: 設定 Python 環境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 還原 SQLite 資料庫快取
        uses: actions/cache@v5
        with:
          path: trendpoint.db
          key: trendpoint-db-${{ github.run_id }}
          restore-keys: |
            trendpoint-db-

      - name: 執行實時訊號檢測與推播
        env:
          # 舊版 LINE Notify 已於 2025-03-31 停止服務，改用 LINE Messaging API
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor_signals.py --once
