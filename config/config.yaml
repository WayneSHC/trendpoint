backtest:
  init_capital: 1000000.0
data:
  database_path: trendpoint.db
  # spec 010：期貨真實資料源參數（TAIFEX 回填/節流/重試 + 交叉驗證容差）
  futures_source:
    backfill_start: "1998-07-21"
    throttle_seconds: 2.0
    max_retries: 3
    verify_tolerance: 0.0
  tickers:
  - 2330.TW
  - 0050.TW
  - 00878.TW
  - 00919.TW
  - 00631L.TW
  # spec 008a：結構化 instrument（期貨）。source=mock 供端到端驗證，來源後補。
  # spec 008b：futures 必帶 contract（乘數/tick/交易所每口每邊定額費，TAIFEX 權威值）。
  instruments:
  - id: TXF
    asset_class: futures
    source: taifex          # spec 010：真源（TAIFEX 官方）——run_ingestion 回填/增量、監控讀庫+當日端點
    display_name: 臺股期貨
    timeframes:
    - daily
    contract:
      point_value: 200      # 大台每點 NT$200
      tick_size: 1
      exchange_fee_per_lot: 20     # 經手費 12 + 結算費 8（每口每邊）
  - id: MTX
    asset_class: futures
    source: mock
    display_name: 小型臺指近月（mock）
    timeframes:
    - daily
    contract:
      point_value: 50       # 小台每點 NT$50
      tick_size: 1
      exchange_fee_per_lot: 12.5   # 經手費 7.5 + 結算費 5（每口每邊）
data_quality:
  max_close_jump_ratio: 3.0
strategy:
  default:
    atr_period: 14
    chandelier_mult: 3.0
    chandelier_period: 22
    ladder_k: 2.0
    time_limit: 15
    use_fvg: true
    fvg_lookback: 3
    # spec 007：MSS fractal 反轉（ticker_overrides 亦可覆寫下列鍵）
    swing_fractal_n: 2
    mss_reversal_entry: true
    mss_ladder_k: null
    mss_volume_mult: 1.5
    # spec 003：期貨做空（預設關；僅期貨生效——現貨結構上無空方路徑）。
    # 對期貨標的啟用：於 ticker_overrides 對期貨 instrument id（如 TXF）設 enable_short: true
    # enable_short: false
  ticker_overrides:
    0050.TW:
      atr_period: 10
      chandelier_mult: 3.0
      chandelier_period: 22
      ladder_k: 1.5
      time_limit: 15
    00631L.TW:
      atr_period: 10
      chandelier_mult: 3.0
      chandelier_period: 22
      ladder_k: 1.5
      time_limit: 15
    00878.TW:
      atr_period: 10
      chandelier_mult: 3.0
      chandelier_period: 22
      ladder_k: 1.5
      time_limit: 15
    00919.TW:
      atr_period: 10
      chandelier_mult: 3.0
      chandelier_period: 22
      ladder_k: 1.5
      time_limit: 15
    2330.TW:
      atr_period: 10
      chandelier_mult: 3.0
      chandelier_period: 22
      ladder_k: 1.5
      time_limit: 15
trading_cost:
  commission_rate: 0.001425
  slip_rate: 0.0005
  tax_rate: 0.003
  # spec 008b：期貨帳戶/政策層費率（契約內生值在 data.instruments 的 contract）
  futures:
    broker_commission_per_lot: 0   # 券商加收每口每邊；0 = 僅 TAIFEX 權威費率（可填實際券商數字）
    tax_rate: 0.00002              # 期交稅/邊（十萬分之二，兩邊各收）
    slippage_ticks: 1              # 每邊滑價 tick 數（1 tick = 1 點）
    margin_rate: 0.055             # 每口保證金 = 名目值 × 此值（歷史約 4-6%）
    margin_utilization: 0.5        # 口數 = floor(權益 × 此值 ÷ 每口保證金)
